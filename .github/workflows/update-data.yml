name: Update Data & Deploy

on:
  schedule:
    # Every hour from 08:00 to 22:00 WIB (01:00–15:00 UTC)
    - cron: '0 1-15 * * *'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest data from Shopl API
        run: python fetch_data.py
        env:
          SHOPL_AUTH_KEY: ${{ secrets.SHOPL_AUTH_KEY }}

      - name: Commit data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: auto-update data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
